<h1>Hello</h1>

<template id="shot-list-item-template">
    <li>
        <div class="name"></div>
        <div class="club"></div>
        <div class="description"></div>
    </li>
</template>

<ul id="shots"> </ul>


<form id="add-shot-type-form" class="form box">
    <h2>Add a new shot type</h2>
    
    <m-input required min="2" name="name" label="Name"></m-input>
    <m-input required min="2" name="club" label="Club"></m-input>
    <m-input required min="2" name="description" label="Description"></m-input>

    <button>Add</button>
</form>
